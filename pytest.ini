[tool:pytest]
# Pytest configuration for InkedUp trading bot

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (medium speed, requires components)
    performance: Performance and benchmark tests (slow, measures performance)
    load_test: Load testing (very slow, stress testing)
    performance_monitoring: Performance monitoring tests
    slow: Tests that take a long time to run
    database: Tests that require database access
    network: Tests that require network access

# Test execution options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --color=yes

# Async test support
asyncio_mode = auto

# Test timeouts
timeout = 300
timeout_method = thread

# Performance test specific settings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning