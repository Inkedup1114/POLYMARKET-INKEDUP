# Docker Compose configuration for staging environment
version: '3.8'

services:
  app:
    build:
      context: .
      target: production
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VERSION: ${IMAGE_TAG:-latest}
        VCS_REF: ${VCS_REF:-}
    image: inkedup-polymarket-bot:${IMAGE_TAG:-latest}
    container_name: inkedup-bot-staging
    ports:
      - "8080:8080"
    volumes:
      - bot-data:/app/data
      - bot-logs:/app/logs
    env_file:
      - scripts/deployment/env/staging.env
    environment:
      - BUILD_DATE=${BUILD_DATE:-}
      - VERSION=${IMAGE_TAG:-latest}
      - VCS_REF=${VCS_REF:-}
    networks:
      - inkedup-staging
    restart: unless-stopped
    depends_on:
      - database
      - redis
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  database:
    image: postgres:15-alpine
    container_name: inkedup-db-staging
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./scripts/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      - POSTGRES_DB=inkedup_staging
      - POSTGRES_USER=staging_user
      - POSTGRES_PASSWORD=${DB_PASSWORD:-staging_pass}
    networks:
      - inkedup-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U staging_user -d inkedup_staging"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inkedup-redis-staging
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
      - ./scripts/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - inkedup-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: inkedup-nginx-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./scripts/nginx/staging.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    networks:
      - inkedup-staging
    restart: unless-stopped
    depends_on:
      - app

  prometheus:
    image: prom/prometheus:latest
    container_name: inkedup-prometheus-staging
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus-staging.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - inkedup-staging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: inkedup-grafana-staging
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana-staging:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    networks:
      - inkedup-staging
    restart: unless-stopped

volumes:
  bot-data:
    driver: local
  bot-logs:
    driver: local
  db-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  inkedup-staging:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16