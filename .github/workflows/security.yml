# Security scanning workflow for InkedUp Polymarket Bot
name: Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.6.1
        virtualenvs-create: true
        virtualenvs-in-project: true
        
    - name: Load cached venv
      id: cached-poetry-dependencies
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('**/poetry.lock') }}
        
    - name: Install dependencies
      if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
      run: poetry install --only=main
      
    - name: Run Safety check
      run: |
        poetry add --group=dev safety
        poetry run safety check --json --output safety-report.json || true
        
    - name: Upload Safety report
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: safety-report
        path: safety-report.json
        
    - name: Run Bandit security scan
      run: |
        poetry add --group=dev bandit[toml]
        poetry run bandit -r inkedup_bot/ -f json -o bandit-report.json || true
        
    - name: Upload Bandit report
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: bandit-report
        path: bandit-report.json
        
    - name: Run pip-audit
      run: |
        pip install pip-audit
        pip-audit --format=json --output=pip-audit-report.json || true
        
    - name: Upload pip-audit report
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: pip-audit-report
        path: pip-audit-report.json

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Run TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified
        
    - name: Run GitLeaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE}}
        
    - name: Run detect-secrets
      run: |
        pip install detect-secrets
        detect-secrets scan --all-files --baseline .secrets.baseline
        detect-secrets audit .secrets.baseline || true

  code-analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: python
        queries: security-extended,security-and-quality
        
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 1.6.1
        
    - name: Install dependencies
      run: poetry install --only=main
      
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2
      with:
        category: "/language:python"
        
    - name: Run Semgrep
      uses: semgrep/semgrep-action@v1
      with:
        config: >-
          p/security-audit
          p/python
          p/bandit
          p/owasp-top-ten
        generateSarif: "1"
        
    - name: Upload Semgrep results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: semgrep.sarif

  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Build Docker image for scanning
      uses: docker/build-push-action@v5
      with:
        context: .
        target: production
        tags: inkedup-bot:security-scan
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
        
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'inkedup-bot:security-scan'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'
        
    - name: Run Hadolint Dockerfile linter
      uses: hadolint/hadolint-action@v3.1.0
      with:
        dockerfile: Dockerfile
        format: sarif
        output-file: hadolint-results.sarif
        no-fail: true
        
    - name: Upload Hadolint results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: hadolint-results.sarif
        
    - name: Run Docker Scout
      uses: docker/scout-action@v1
      if: github.event_name != 'pull_request_target'
      with:
        command: cves
        image: inkedup-bot:security-scan
        sarif-file: scout-results.sarif
        
    - name: Upload Scout results
      uses: github/codeql-action/upload-sarif@v2
      if: always() && github.event_name != 'pull_request_target'
      with:
        sarif_file: scout-results.sarif

  infrastructure-security:
    name: Infrastructure as Code Security
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Checkov
      uses: bridgecrewio/checkov-action@master
      with:
        directory: .
        quiet: true
        soft_fail: true
        framework: dockerfile,github_actions
        output_format: sarif
        output_file_path: checkov-results.sarif
        
    - name: Upload Checkov results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: checkov-results.sarif
        
    - name: Run Kics Scan
      uses: checkmarx/kics-github-action@v1.7.0
      with:
        path: .
        fail_on: high,medium
        output_formats: json,sarif
        output_path: kics-results
        
    - name: Upload Kics results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: kics-results/results.sarif

  compliance-check:
    name: Security Compliance Check
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check for security policy
      run: |
        if [[ ! -f SECURITY.md ]]; then
          echo "❌ SECURITY.md file not found"
          exit 1
        else
          echo "✅ SECURITY.md file found"
        fi
        
    - name: Check for .env.example
      run: |
        if [[ ! -f .env.example ]]; then
          echo "❌ .env.example file not found"
          exit 1
        else
          echo "✅ .env.example file found"
        fi
        
    - name: Validate Docker security best practices
      run: |
        # Check if Dockerfile runs as non-root user
        if grep -q "USER.*inkedup" Dockerfile; then
          echo "✅ Dockerfile uses non-root user"
        else
          echo "❌ Dockerfile should use non-root user"
          exit 1
        fi
        
        # Check if HEALTHCHECK is defined
        if grep -q "HEALTHCHECK" Dockerfile; then
          echo "✅ Dockerfile includes health check"
        else
          echo "❌ Dockerfile should include health check"
          exit 1
        fi
        
    - name: Check secrets scanning baseline
      run: |
        if [[ -f .secrets.baseline ]]; then
          echo "✅ Secrets scanning baseline found"
          # Validate baseline is not empty
          if [[ -s .secrets.baseline ]]; then
            echo "✅ Secrets baseline is properly configured"
          else
            echo "❌ Secrets baseline is empty"
            exit 1
          fi
        else
          echo "❌ .secrets.baseline file not found"
          echo "Run: detect-secrets scan --all-files --baseline .secrets.baseline"
          exit 1
        fi

  security-report:
    name: Security Report Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, secret-scan, code-analysis, docker-security, infrastructure-security, compliance-check]
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      
    - name: Generate security summary
      run: |
        echo "# Security Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Check job results
        if [[ "${{ needs.dependency-scan.result }}" == "success" ]]; then
          echo "✅ Dependency scan passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Dependency scan failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [[ "${{ needs.secret-scan.result }}" == "success" ]]; then
          echo "✅ Secret scan passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Secret scan failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [[ "${{ needs.code-analysis.result }}" == "success" ]]; then
          echo "✅ Code analysis passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Code analysis failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [[ "${{ needs.docker-security.result }}" == "success" ]]; then
          echo "✅ Docker security scan passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Docker security scan failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [[ "${{ needs.infrastructure-security.result }}" == "success" ]]; then
          echo "✅ Infrastructure security check passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Infrastructure security check failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        if [[ "${{ needs.compliance-check.result }}" == "success" ]]; then
          echo "✅ Compliance check passed" >> $GITHUB_STEP_SUMMARY
        else
          echo "❌ Compliance check failed" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📊 **Detailed reports are available in the Security tab**" >> $GITHUB_STEP_SUMMARY
        
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const summary = fs.readFileSync(process.env.GITHUB_STEP_SUMMARY, 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🔒 Security Scan Results\n\n${summary}`
          });