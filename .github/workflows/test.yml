name: Test Suite

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  PYTHON_VERSION: "3.12"
  
jobs:
  # Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
        
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        virtualenvs-create: true
        virtualenvs-in-project: true
        
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
        
    - name: Install dependencies
      run: |
        poetry install --no-interaction
        
    - name: Run unit tests
      run: |
        poetry run pytest tests/ \
          -v \
          --cov=inkedup_bot \
          --cov-report=xml \
          --cov-report=html \
          --cov-report=term-missing \
          --junit-xml=junit.xml \
          --tb=short \
          -m "not integration and not slow"
          
    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      if: matrix.python-version == '3.12'
      with:
        file: ./coverage.xml
        flags: unit
        
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: unit-test-results-${{ matrix.python-version }}
        path: |
          junit.xml
          htmlcov/
          
  # Integration Tests
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      
    - name: Install dependencies
      run: |
        poetry install --no-interaction
        
    - name: Wait for PostgreSQL
      run: |
        until pg_isready -h localhost -p 5432 -U testuser; do
          echo "Waiting for PostgreSQL..."
          sleep 2
        done
        
    - name: Set up test database
      run: |
        poetry run python -c "
        import asyncio
        from inkedup_bot.database import DatabaseManager
        
        async def setup_db():
            db = DatabaseManager('postgresql://testuser:testpass@localhost:5432/testdb')
            await db.initialize()
            await db.close()
            
        asyncio.run(setup_db())
        "
        
    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
        TEST_MODE: "integration"
      run: |
        poetry run pytest tests/ \
          -v \
          --cov=inkedup_bot \
          --cov-report=xml \
          --junit-xml=integration-junit.xml \
          -m "integration" \
          --tb=short
          
    - name: Upload integration test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: integration-test-results
        path: |
          integration-junit.xml
          coverage.xml
          
  # Performance Tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      
    - name: Install dependencies
      run: |
        poetry install --no-interaction
        poetry run pip install pytest-benchmark
        
    - name: Run performance tests
      run: |
        poetry run pytest tests/ \
          -v \
          -m "performance" \
          --benchmark-only \
          --benchmark-json=benchmark.json \
          --tb=short
          
    - name: Store benchmark results
      uses: benchmark-action/github-action-benchmark@v1
      if: github.ref == 'refs/heads/main'
      with:
        tool: 'pytest'
        output-file-path: benchmark.json
        github-token: ${{ secrets.GITHUB_TOKEN }}
        auto-push: true
        
  # Load Tests
  load-tests:
    name: Load Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      
    - name: Install dependencies
      run: |
        poetry install --no-interaction
        poetry run pip install locust
        
    - name: Run load tests
      run: |
        poetry run locust \
          --locustfile tests/load_test.py \
          --headless \
          --users 10 \
          --spawn-rate 2 \
          --run-time 60s \
          --html load-test-report.html \
          --csv load-test
          
    - name: Upload load test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: load-test-results
        path: |
          load-test-report.html
          load-test_*.csv
          
  # Mutation Testing
  mutation-tests:
    name: Mutation Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event_name == 'schedule' || contains(github.event.pull_request.labels.*.name, 'mutation-test')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install Poetry
      uses: snok/install-poetry@v1
      
    - name: Install dependencies
      run: |
        poetry install --no-interaction
        poetry run pip install mutmut
        
    - name: Run mutation tests
      run: |
        poetry run mutmut run --paths-to-mutate inkedup_bot/ \
          --tests-dir tests/ \
          --runner "python -m pytest -x" \
          || true  # Don't fail CI on mutation test failures
          
    - name: Generate mutation report
      run: |
        poetry run mutmut html
        poetry run mutmut show
        
    - name: Upload mutation test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: mutation-test-results
        path: html/
        
  # Test Report
  test-report:
    name: Generate Test Report
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, performance-tests, load-tests]
    if: always()
    
    steps:
    - name: Download all test artifacts
      uses: actions/download-artifact@v3
      
    - name: Generate combined test report
      run: |
        echo "# Test Results Summary" > test-report.md
        echo "" >> test-report.md
        echo "## Test Execution Status" >> test-report.md
        echo "- Unit Tests: ${{ needs.unit-tests.result }}" >> test-report.md
        echo "- Integration Tests: ${{ needs.integration-tests.result }}" >> test-report.md
        echo "- Performance Tests: ${{ needs.performance-tests.result }}" >> test-report.md
        echo "- Load Tests: ${{ needs.load-tests.result }}" >> test-report.md
        echo "" >> test-report.md
        
        if [ -f unit-test-results-3.12/junit.xml ]; then
          echo "## Coverage Report" >> test-report.md
          echo "Coverage reports available in artifacts." >> test-report.md
        fi
        
    - name: Comment PR with test results
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request'
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('test-report.md')) {
            const report = fs.readFileSync('test-report.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });
          }
          
    - name: Upload test report
      uses: actions/upload-artifact@v3
      with:
        name: combined-test-report
        path: test-report.md