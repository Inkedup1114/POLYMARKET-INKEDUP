version: '3.8'

services:
  # Prometheus for metrics collection and storage
  prometheus:
    image: prom/prometheus:latest
    container_name: inkedup_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    networks:
      - monitoring
    labels:
      - "com.docker.compose.service=monitoring"

  # Grafana for visualization and dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: inkedup_grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/dashboards/inkedup_overview.json
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - monitoring
    labels:
      - "com.docker.compose.service=monitoring"

  # AlertManager for alert management and notifications
  alertmanager:
    image: prom/alertmanager:latest
    container_name: inkedup_alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
      - '--cluster.advertise-address=0.0.0.0:9093'
    restart: unless-stopped
    depends_on:
      - prometheus
    networks:
      - monitoring
    labels:
      - "com.docker.compose.service=monitoring"

  # Node Exporter for system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: inkedup_node_exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host'
      - '--collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($$|/)'
    restart: unless-stopped
    networks:
      - monitoring
    labels:
      - "com.docker.compose.service=monitoring"

  # cAdvisor for container metrics
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: inkedup_cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/host:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    devices:
      - /dev/kmsg
    restart: unless-stopped
    networks:
      - monitoring
    labels:
      - "com.docker.compose.service=monitoring"

  # Loki for log aggregation
  loki:
    image: grafana/loki:latest
    container_name: inkedup_loki
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki/loki.yml:/etc/loki/config.yml
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    restart: unless-stopped
    networks:
      - monitoring
    labels:
      - "com.docker.compose.service=monitoring"

  # Promtail for log collection
  promtail:
    image: grafana/promtail:latest
    container_name: inkedup_promtail
    volumes:
      - ./monitoring/promtail/promtail.yml:/etc/promtail/config.yml
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki
    networks:
      - monitoring
    labels:
      - "com.docker.compose.service=monitoring"

volumes:
  prometheus_data:
    name: inkedup_prometheus_data
  grafana_data:
    name: inkedup_grafana_data
  alertmanager_data:
    name: inkedup_alertmanager_data
  loki_data:
    name: inkedup_loki_data

networks:
  monitoring:
    name: inkedup_monitoring
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16