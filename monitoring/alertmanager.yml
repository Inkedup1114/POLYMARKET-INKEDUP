# Alertmanager configuration for InkedUp Polymarket Bot
global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@inkedup.com'
  smtp_auth_username: 'alerts@inkedup.com'
  smtp_auth_password_file: '/etc/alertmanager/smtp_password'

route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 12h
  receiver: 'default'
  routes:
    # Critical trading alerts - immediate notification
    - match:
        severity: critical
        category: trading
      receiver: 'critical-trading'
      group_wait: 0s
      repeat_interval: 5m
      
    # System alerts
    - match:
        severity: critical
        category: system
      receiver: 'critical-system'
      group_wait: 30s
      repeat_interval: 15m
      
    # Business alerts
    - match:
        severity: warning
        category: business
      receiver: 'business-warnings'
      group_wait: 5m
      repeat_interval: 1h
      
    # Performance alerts
    - match:
        category: performance
      receiver: 'performance-team'
      group_wait: 2m
      repeat_interval: 30m

receivers:
  - name: 'default'
    slack_configs:
      - api_url_file: '/etc/alertmanager/slack_webhook'
        channel: '#alerts'
        title: 'InkedUp Bot Alert'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'critical-trading'
    # Multiple notification channels for critical trading issues
    slack_configs:
      - api_url_file: '/etc/alertmanager/slack_webhook_critical'
        channel: '#trading-alerts'
        title: '🚨 CRITICAL TRADING ALERT'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          *Environment:* {{ .Labels.environment }}
          {{ end }}
        actions:
          - type: button
            text: 'View Dashboard'
            url: 'https://grafana.inkedup.com/d/trading'
          - type: button
            text: 'Check Logs'
            url: 'https://logs.inkedup.com'
    email_configs:
      - to: 'trading-team@inkedup.com'
        subject: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
        body: |
          {{ range .Alerts }}
          Alert: {{ .Annotations.summary }}
          Description: {{ .Annotations.description }}
          Severity: {{ .Labels.severity }}
          Service: {{ .Labels.service }}
          Environment: {{ .Labels.environment }}
          Started: {{ .StartsAt }}
          {{ end }}
    webhook_configs:
      - url: 'https://api.inkedup.com/alerts/critical'
        http_config:
          bearer_token_file: '/etc/alertmanager/webhook_token'

  - name: 'critical-system'
    slack_configs:
      - api_url_file: '/etc/alertmanager/slack_webhook'
        channel: '#system-alerts'
        title: '🔥 CRITICAL SYSTEM ALERT'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Service:* {{ .Labels.service }}
          *Instance:* {{ .Labels.instance }}
          {{ end }}
    email_configs:
      - to: 'devops-team@inkedup.com'
        subject: '🔥 CRITICAL SYSTEM: {{ .GroupLabels.alertname }}'

  - name: 'business-warnings'
    slack_configs:
      - api_url_file: '/etc/alertmanager/slack_webhook'
        channel: '#business-alerts'
        title: '⚠️ Business Warning'
        text: |
          {{ range .Alerts }}
          *Warning:* {{ .Annotations.summary }}
          *Details:* {{ .Annotations.description }}
          *Impact:* {{ .Annotations.impact | default "Unknown" }}
          {{ end }}

  - name: 'performance-team'
    slack_configs:
      - api_url_file: '/etc/alertmanager/slack_webhook'
        channel: '#performance'
        title: '📊 Performance Alert'
        text: |
          {{ range .Alerts }}
          *Performance Issue:* {{ .Annotations.summary }}
          *Metric:* {{ .Labels.metric_name }}
          *Current Value:* {{ .Annotations.current_value }}
          *Threshold:* {{ .Annotations.threshold }}
          {{ end }}

inhibit_rules:
  # Inhibit non-critical alerts when critical ones are firing
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'service']

  # Inhibit individual service alerts when entire system is down
  - source_match:
      alertname: 'SystemDown'
    target_match_re:
      alertname: '.*ServiceDown'

  # Inhibit database connection alerts when database is down
  - source_match:
      alertname: 'DatabaseDown'
    target_match:
      alertname: 'DatabaseConnectionHigh'
    equal: ['instance']

templates:
  - '/etc/alertmanager/templates/*.tmpl'

# Global configuration for notification timing
global:
  # ResolveTimeout is the default value used by alertmanager if the alert does
  # not include EndsAt, after this time passes it can declare the alert as resolved if it has not been updated.
  resolve_timeout: 5m

# Configuration for Slack template
templates:
  - '/etc/alertmanager/slack.tmpl'