# Prometheus alert rules for InkedUp Polymarket Trading Bot
groups:
  - name: inkedup.system
    rules:
      # System Resource Alerts
      - alert: HighCPUUsage
        expr: inkedup:cpu_usage_percent > 85
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High CPU usage detected"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"
          
      - alert: CriticalCPUUsage
        expr: inkedup:cpu_usage_percent > 95
        for: 2m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Critical CPU usage detected"
          description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"
          
      - alert: HighMemoryUsage
        expr: inkedup:memory_usage_percent > 90
        for: 5m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High memory usage detected"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"
          
      - alert: CriticalMemoryUsage
        expr: inkedup:memory_usage_percent > 98
        for: 1m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Critical memory usage detected"
          description: "Memory usage is {{ $value }}% on {{ $labels.instance }}"
          
      - alert: HighDiskUsage
        expr: inkedup:disk_usage_percent > 85
        for: 10m
        labels:
          severity: warning
          component: system
        annotations:
          summary: "High disk usage detected"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }}"
          
      - alert: CriticalDiskUsage
        expr: inkedup:disk_usage_percent > 95
        for: 5m
        labels:
          severity: critical
          component: system
        annotations:
          summary: "Critical disk usage detected"
          description: "Disk usage is {{ $value }}% on {{ $labels.instance }}"

  - name: inkedup.application
    rules:
      # Application Health Alerts
      - alert: ApplicationDown
        expr: up{job="inkedup-app"} == 0
        for: 1m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "InkedUp application is down"
          description: "InkedUp trading bot application has been down for more than 1 minute"
          
      - alert: HealthCheckFailing
        expr: inkedup_health_check_status != 1
        for: 3m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Application health check failing"
          description: "Health check has been failing for {{ $labels.component }}"
          
      - alert: HighErrorRate
        expr: inkedup:error_rate_5m > 10
        for: 3m
        labels:
          severity: warning
          component: application
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }}% over the last 5 minutes"
          
      - alert: CriticalErrorRate
        expr: inkedup:error_rate_5m > 25
        for: 1m
        labels:
          severity: critical
          component: application
        annotations:
          summary: "Critical error rate detected"
          description: "Error rate is {{ $value }}% over the last 5 minutes"

  - name: inkedup.trading
    rules:
      # Trading-specific Alerts
      - alert: LowOrderSuccessRate
        expr: inkedup:order_success_rate < 90
        for: 5m
        labels:
          severity: warning
          component: trading
        annotations:
          summary: "Low order success rate"
          description: "Order success rate is {{ $value }}% over the last 5 minutes"
          
      - alert: CriticalOrderSuccessRate
        expr: inkedup:order_success_rate < 70
        for: 2m
        labels:
          severity: critical
          component: trading
        annotations:
          summary: "Critical order success rate"
          description: "Order success rate is {{ $value }}% over the last 5 minutes"
          
      - alert: HighOrderLatency
        expr: inkedup:avg_order_latency_ms > 2000
        for: 3m
        labels:
          severity: warning
          component: trading
        annotations:
          summary: "High order latency detected"
          description: "Average order latency is {{ $value }}ms over the last 5 minutes"
          
      - alert: WebSocketDisconnected
        expr: inkedup:websocket_connection_health < 1
        for: 30s
        labels:
          severity: critical
          component: websocket
        annotations:
          summary: "WebSocket connection lost"
          description: "WebSocket connection to market data feed has been lost"
          
      - alert: NoTradingActivity
        expr: rate(inkedup_orders_total[10m]) == 0
        for: 15m
        labels:
          severity: warning
          component: trading
        annotations:
          summary: "No trading activity detected"
          description: "No orders have been placed in the last 15 minutes"

  - name: inkedup.database
    rules:
      # Database Performance Alerts
      - alert: DatabaseConnectionPoolExhausted
        expr: inkedup_database_connections_active / inkedup_database_connections_max > 0.9
        for: 2m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Database connection pool nearly exhausted"
          description: "Database connection pool is {{ $value | humanizePercentage }} full"
          
      - alert: SlowDatabaseQueries
        expr: inkedup_database_query_duration_seconds{quantile="0.95"} > 1
        for: 5m
        labels:
          severity: warning
          component: database
        annotations:
          summary: "Slow database queries detected"
          description: "95th percentile query time is {{ $value }}s"
          
      - alert: DatabaseLockWaitTime
        expr: inkedup_database_lock_wait_seconds > 5
        for: 2m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "Long database lock wait times"
          description: "Database lock wait time is {{ $value }}s"

  - name: inkedup.monitoring
    rules:
      # Monitoring Infrastructure Alerts
      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 5m
        labels:
          severity: critical
          component: monitoring
        annotations:
          summary: "Prometheus is down"
          description: "Prometheus has been down for more than 5 minutes"
          
      - alert: AlertManagerDown
        expr: up{job="alertmanager"} == 0
        for: 5m
        labels:
          severity: critical
          component: monitoring
        annotations:
          summary: "AlertManager is down"
          description: "AlertManager has been down for more than 5 minutes"
          
      - alert: GrafanaDown
        expr: up{job="grafana"} == 0
        for: 5m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "Grafana is down"
          description: "Grafana has been down for more than 5 minutes"
          
      - alert: HighPrometheusIngestRate
        expr: rate(prometheus_tsdb_samples_appended_total[5m]) > 10000
        for: 5m
        labels:
          severity: warning
          component: monitoring
        annotations:
          summary: "High Prometheus ingestion rate"
          description: "Prometheus is ingesting {{ $value }} samples per second"

  - name: inkedup.containers
    rules:
      # Container-specific Alerts
      - alert: ContainerHighCPU
        expr: rate(container_cpu_usage_seconds_total{name=~"inkedup.*"}[5m]) > 0.8
        for: 5m
        labels:
          severity: warning
          component: containers
        annotations:
          summary: "Container {{ $labels.name }} high CPU usage"
          description: "Container {{ $labels.name }} CPU usage is {{ $value | humanizePercentage }}"
          
      - alert: ContainerHighMemory
        expr: container_memory_usage_bytes{name=~"inkedup.*"} / container_spec_memory_limit_bytes > 0.9
        for: 5m
        labels:
          severity: warning
          component: containers
        annotations:
          summary: "Container {{ $labels.name }} high memory usage"
          description: "Container {{ $labels.name }} memory usage is {{ $value | humanizePercentage }}"
          
      - alert: ContainerRestarting
        expr: rate(container_last_seen{name=~"inkedup.*"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
          component: containers
        annotations:
          summary: "Container {{ $labels.name }} is restarting"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last 5 minutes"

  - name: inkedup.business
    rules:
      # Business Logic Alerts
      - alert: UnexpectedPnLMovement
        expr: abs(delta(inkedup_total_pnl[5m])) > 1000
        for: 1m
        labels:
          severity: warning
          component: trading
        annotations:
          summary: "Unexpected PnL movement detected"
          description: "PnL has moved by ${{ $value }} in the last 5 minutes"
          
      - alert: LargePositionSize
        expr: inkedup_position_size > 10000
        for: 2m
        labels:
          severity: warning
          component: risk
        annotations:
          summary: "Large position size detected"
          description: "Position size is ${{ $value }} for {{ $labels.market }}"
          
      - alert: MarketDataStale
        expr: time() - inkedup_last_market_data_timestamp > 60
        for: 2m
        labels:
          severity: critical
          component: market_data
        annotations:
          summary: "Market data is stale"
          description: "Last market data update was {{ $value }}s ago"