# Prometheus configuration for staging environment
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'staging'
    cluster: 'inkedup-staging'

rule_files:
  - "/etc/prometheus/rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # InkedUp Polymarket Bot - Main application
  - job_name: 'inkedup-bot'
    scrape_interval: 10s
    scrape_timeout: 5s
    metrics_path: /metrics
    static_configs:
      - targets: ['app:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: app:8080

  # Database monitoring
  - job_name: 'postgres'
    scrape_interval: 30s
    static_configs:
      - targets: ['database:5432']
    metrics_path: /metrics

  # Redis monitoring
  - job_name: 'redis'
    scrape_interval: 30s
    static_configs:
      - targets: ['redis:6379']
    metrics_path: /metrics

  # NGINX monitoring
  - job_name: 'nginx'
    scrape_interval: 30s
    static_configs:
      - targets: ['nginx:80']
    metrics_path: /nginx_status

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    scrape_interval: 30s
    static_configs:
      - targets: ['node-exporter:9100']

  # Container monitoring
  - job_name: 'cadvisor'
    scrape_interval: 30s
    static_configs:
      - targets: ['cadvisor:8080']

  # Application-specific business metrics
  - job_name: 'inkedup-business-metrics'
    scrape_interval: 5s
    scrape_timeout: 3s
    metrics_path: /metrics/business
    static_configs:
      - targets: ['app:8080']
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'inkedup_(orders|positions|risk|arbitrage)_.*'
        target_label: metric_type
        replacement: 'business'

  # Health check monitoring
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://app:8080/health
          - http://app:8080/readiness
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Grafana monitoring
  - job_name: 'grafana'
    scrape_interval: 30s
    static_configs:
      - targets: ['grafana:3000']
    metrics_path: /metrics